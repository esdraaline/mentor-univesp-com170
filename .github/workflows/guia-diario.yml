name: Guia diário Univesp

on:
  schedule:
    - cron: "0 11 * * *"  # 08:00 horário de Brasília (UTC-3, sem horário de verão)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: guia-diario
  cancel-in-progress: false

jobs:
  atualizar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: |
          pip install -r automacao/requirements.txt
          python -m playwright install --with-deps chromium

      - name: Restaurar sessão salva
        run: echo "$AVA_STORAGE_STATE" > automacao/storage_state.json
        env:
          AVA_STORAGE_STATE: ${{ secrets.AVA_STORAGE_STATE }}

      - name: Gerar guia
        run: python automacao/gerar_guia.py

      - name: Limpar sessão do runner
        if: always()
        run: rm -f automacao/storage_state.json

      - name: Publicar mudanças
        run: |
          git config user.name "guia-univesp-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/
          if git diff --cached --quiet; then
            echo "Sem mudanças hoje."
          else
            git commit -m "Atualização diária do guia ($(date -u +%Y-%m-%d))"
            git push
          fi

      - name: Verificar sessão
        run: |
          if grep -q '"status": "session_expired"' docs/data.json; then
            echo "::error::Sessão do AVA expirou. Rode 'python automacao/capturar_sessao.py' e depois 'python automacao/publicar_sessao_no_github.py' para renovar."
            exit 1
          fi
